name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # firebirdsql/firebird only publishes stable tags from 3.0 onward; jacobalberty/firebird
          # (archived, but still pullable) is the only source found for a 2.5 image. Both accept
          # the SYSDBA password through different env vars, so the service sets both.
          - firebird_version: '2.5'
            image: jacobalberty/firebird:2.5.7-sc
          - firebird_version: '3.0'
            image: firebirdsql/firebird:3.0.12
          - firebird_version: '4.0'
            image: jacobalberty/firebird:v4.0.2
          - firebird_version: '5.0'
            image: jacobalberty/firebird:v5.0.0

    name: Firebird ${{ matrix.firebird_version }}

    services:
      firebird:
        image: ${{ matrix.image }}
        env:
          FIREBIRD_ROOT_PASSWORD: masterkey
          ISC_PASSWORD: masterkey
        ports:
          - 3050:3050

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run test-unit

      - name: Create Firebird test database
        env:
          FIREBIRD_DATABASE: /tmp/ci-test.fdb
          FIREBIRD_ROOT_PASSWORD: masterkey
        run: node scripts/create-ci-database.mjs

      - name: Integration tests
        env:
          FIREBIRD_HOST: localhost
          FIREBIRD_PORT: 3050
          FIREBIRD_DATABASE: /tmp/ci-test.fdb
          FIREBIRD_USER: sysdba
          FIREBIRD_PASSWORD: masterkey
        run: npm run test-integration
